<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Task Timer</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --text: #f0f0f0;
    --text-dim: #a0a0c0;
    --accent: #e94560;
    --success: #4ecca3;
    --warning: #f0c040;
    --info: #7b68ee;
  }

  :root.light {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #e0e0e8;
    --text: #000000;
    --text-dim: #444444;
    --accent: #e94560;
    --success: #2d9f78;
    --warning: #d4a520;
    --info: #5b4cc4;
  }
  :root.light .task-time-display { color: #000 !important; }
  :root.light .task-title { color: #000 !important; }
  :root.light .task-card.active .task-title { color: var(--accent) !important; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 2px solid var(--surface2);
    flex-wrap: wrap;
    gap: 12px;
  }
  .top-bar h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e94560, #f0c040, #4ecca3, #7b68ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .top-bar-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ===== BUTTONS ===== */
  button {
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  button:hover { transform: scale(1.04); }
  button:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--success); color: #1a1a2e; }
  .btn-warning { background: var(--warning); color: #1a1a2e; }
  .btn-info { background: var(--info); color: #fff; }
  .btn-small { padding: 6px 12px; font-size: 0.82rem; border-radius: 8px; }
  .btn-icon { padding: 8px 12px; font-size: 1.1rem; border-radius: 10px; background: var(--surface2); color: var(--text); }

  /* ===== VIEW TABS ===== */
  .view-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
  }
  .view-tab {
    padding: 8px 16px;
    border-radius: 9px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .view-tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* ===== LAYOUT TOGGLES ===== */
  .layout-toggles {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
  }
  .layout-btn {
    padding: 6px 10px;
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    font-size: 1rem;
  }
  .layout-btn.active {
    background: var(--info);
    color: #fff;
  }

  /* ===== TASK GRID ===== */
  .task-container {
    padding: 24px;
  }

  .task-grid {
    display: grid;
    gap: 20px;
  }
  .task-grid.layout-grid {
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .task-grid.layout-vertical {
    grid-template-columns: 1fr;
    max-width: 600px;
    margin: 0 auto;
  }
  .task-grid.layout-horizontal {
    grid-auto-flow: column;
    grid-auto-columns: 300px;
    overflow-x: auto;
    padding-bottom: 12px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: var(--surface);
    border: 2px solid var(--surface2);
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 200px;
  }
  .task-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(233, 69, 96, 0.25);
  }
  .task-card.completed {
    border-color: var(--success);
    opacity: 0.75;
  }

  /* Fill overlay */
  .task-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0%;
    transition: height 0.5s linear;
    opacity: 0.2;
    z-index: 0;
    border-radius: 0 0 16px 16px;
  }

  .task-content {
    position: relative;
    z-index: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100%;
  }

  .task-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .task-emoji {
    font-size: 2rem;
    line-height: 1;
  }
  .task-title {
    font-size: 1.25rem;
    font-weight: 700;
    flex: 1;
    line-height: 1.3;
  }
  .task-order {
    font-size: 0.75rem;
    color: var(--text-dim);
    background: var(--surface2);
    border-radius: 6px;
    padding: 2px 8px;
    white-space: nowrap;
  }

  .task-time-display {
    font-size: 3rem;
    font-weight: 800;
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    padding: 10px 0;
  }

  /* Progress bar */
  .task-progress-bar {
    height: 12px;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
  }
  .task-progress-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s linear;
    width: 0%;
  }

  .task-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .task-status {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* ===== ACTIVE INDICATOR ===== */
  .task-card.active .task-title {
    color: var(--accent);
  }
  .task-card.active .task-time-display {
    color: #fff;
  }

  /* Almost done pulse */
  @keyframes pulse-warning {
    0%, 100% { box-shadow: 0 0 20px rgba(240, 192, 64, 0.3); }
    50% { box-shadow: 0 0 40px rgba(240, 192, 64, 0.6); }
  }
  .task-card.warning {
    animation: pulse-warning 1s infinite;
    border-color: var(--warning);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 2px solid var(--surface2);
  }
  .modal h2 {
    font-size: 1.4rem;
    margin-bottom: 20px;
    color: var(--accent);
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid var(--surface2);
    background: var(--bg);
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--info);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .color-picker-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: #fff; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  /* ===== SCHEDULE BAR (WEEKLY) ===== */
  .week-bar {
    display: flex;
    gap: 4px;
    padding: 12px 24px;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
  }
  .day-btn {
    padding: 8px 16px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .day-btn.active {
    background: var(--info);
    color: #fff;
  }
  .day-btn.today {
    border: 2px solid var(--warning);
  }

  /* ===== GLOBAL CONTROLS ===== */
  .global-controls {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    background: var(--surface);
    border-top: 2px solid var(--surface2);
    position: sticky;
    bottom: 0;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-dim);
  }
  .empty-state .emoji { font-size: 4rem; margin-bottom: 16px; }
  .empty-state p { font-size: 1.1rem; margin-bottom: 24px; }

  /* ===== SAVE/LOAD INDICATOR ===== */
  .save-indicator {
    font-size: 0.8rem;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-indicator.show { opacity: 1; }

  /* ===== RESPONSIVE ===== */

  /* TABLET (601px - 1024px) */
  @media (min-width: 601px) and (max-width: 1024px) {
    .top-bar { padding: 14px 20px; }
    .top-bar h1 { font-size: 1.4rem; }
    .task-grid.layout-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .task-container { padding: 20px; }
    .task-time-display { font-size: 2.8rem; }
    .task-card { min-height: 190px; }
    button { padding: 12px 20px; min-height: 48px; }
    .btn-small { padding: 10px 16px; min-height: 44px; font-size: 0.9rem; }
    .btn-icon { min-height: 48px; min-width: 48px; }
  }

  /* DESKTOP (1025px+) */
  @media (min-width: 1025px) {
    .task-grid.layout-grid {
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
    .task-container { padding: 30px 40px; }
    .task-card { min-height: 220px; }
    .task-time-display { font-size: 3.2rem; }
    .top-bar { padding: 16px 32px; }
  }

  /* LARGE DESKTOP (1400px+) */
  @media (min-width: 1400px) {
    .task-grid.layout-grid {
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .task-container { padding: 36px 60px; }
  }

  /* MOBILE (600px and below) */
  @media (max-width: 600px) {
    .top-bar {
      padding: 12px 14px;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .top-bar h1 {
      font-size: 1.3rem;
      text-align: center;
    }
    .top-bar-controls {
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .view-tabs { width: 100%; justify-content: center; }
    .view-tab { flex: 1; text-align: center; padding: 10px 8px; font-size: 0.85rem; }
    .layout-toggles { justify-content: center; }

    .task-container { padding: 12px; }
    .task-grid { gap: 14px; }
    .task-grid.layout-grid {
      grid-template-columns: 1fr;
    }
    .task-grid.layout-horizontal {
      grid-auto-columns: 85vw;
    }

    .task-card { min-height: 180px; }
    .task-content { padding: 16px; }
    .task-emoji { font-size: 1.8rem; }
    .task-title { font-size: 1.15rem; }
    .task-time-display { font-size: 2.6rem; padding: 8px 0; }
    .task-progress-bar { height: 14px; border-radius: 7px; }
    .task-progress-fill { border-radius: 7px; }

    /* Big touch targets — critical for accessibility */
    button { min-height: 48px; padding: 12px 18px; font-size: 1rem; }
    .btn-small { min-height: 48px; padding: 12px 16px; font-size: 0.95rem; border-radius: 10px; }
    .btn-icon { min-height: 48px; min-width: 48px; font-size: 1.2rem; }
    .task-controls { gap: 10px; }

    .global-controls {
      padding: 14px;
      gap: 8px;
    }
    .global-controls button { flex: 1; min-width: 0; font-size: 0.9rem; padding: 12px 10px; }

    /* Modal — full width on mobile */
    .modal {
      border-radius: 16px 16px 0 0;
      max-height: 85vh;
      padding: 24px 20px;
    }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .form-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group input, .form-group select {
      padding: 12px 14px;
      font-size: 1.05rem;
      min-height: 48px;
    }
    .color-swatch { width: 42px; height: 42px; }
    .modal-actions { flex-wrap: wrap; }
    .modal-actions button { flex: 1; min-height: 48px; }

    /* Week bar */
    .week-bar { padding: 10px 12px; }
    .day-btn { padding: 10px 12px; font-size: 0.85rem; min-height: 44px; }
  }

  /* SMALL MOBILE (380px and below) */
  @media (max-width: 380px) {
    .top-bar h1 { font-size: 1.1rem; }
    .task-time-display { font-size: 2.2rem; }
    .task-title { font-size: 1.05rem; }
    .task-emoji { font-size: 1.5rem; }
    .task-container { padding: 8px; }
    .view-tab { padding: 8px 6px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h1>✨ Visual Task Timer</h1>
  <div class="top-bar-controls">
    <div class="view-tabs">
      <button class="view-tab active" data-view="daily" onclick="switchView('daily')">📋 Daily</button>
      <button class="view-tab" data-view="weekly" onclick="switchView('weekly')">📅 Weekly</button>
    </div>
    <div class="layout-toggles">
      <button class="layout-btn active" data-layout="grid" onclick="switchLayout('grid')" title="Grid">⊞</button>
      <button class="layout-btn" data-layout="vertical" onclick="switchLayout('vertical')" title="Vertical">☰</button>
      <button class="layout-btn" data-layout="horizontal" onclick="switchLayout('horizontal')" title="Horizontal">⫼</button>
    </div>
    <button class="btn-primary" onclick="openAddModal()">＋ Add Task</button>
    <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
    <span class="save-indicator" id="saveIndicator">💾 Saved</span>
  </div>
</div>

<!-- WEEK BAR (hidden by default) -->
<div class="week-bar" id="weekBar" style="display:none;"></div>

<!-- TASK AREA -->
<div class="task-container">
  <div class="task-grid layout-grid" id="taskGrid">
    <div class="empty-state" id="emptyState">
      <div class="emoji">🌈</div>
      <p>No tasks yet! Add your first task to get started.</p>
      <button class="btn-primary" onclick="openAddModal()">＋ Add First Task</button>
    </div>
  </div>
</div>

<!-- GLOBAL CONTROLS -->
<div class="global-controls">
  <button class="btn-success" onclick="startAll()">▶ Start All</button>
  <button class="btn-warning" onclick="pauseAll()">⏸ Pause All</button>
  <button class="btn-info" onclick="resetAll()">↺ Reset All</button>
  <button class="btn-icon" onclick="exportSchedule()" title="Save Schedule">💾</button>
  <button class="btn-icon" onclick="document.getElementById('importInput').click()" title="Load Schedule">📂</button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importSchedule(event)">
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="modalTitle">Add New Task</h2>
    <div class="form-group">
      <label>Task Name</label>
      <input type="text" id="taskName" placeholder="e.g., Morning Routine" maxlength="50">
    </div>
    <div class="form-group">
      <label>Emoji Icon</label>
      <div class="color-picker-row" id="emojiPicker">
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="⏰" onclick="pickEmoji(this)">⏰</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="📚" onclick="pickEmoji(this)">📚</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🍳" onclick="pickEmoji(this)">🍳</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🧹" onclick="pickEmoji(this)">🧹</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🎮" onclick="pickEmoji(this)">🎮</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🛁" onclick="pickEmoji(this)">🛁</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🏃" onclick="pickEmoji(this)">🏃</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="💊" onclick="pickEmoji(this)">💊</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🎨" onclick="pickEmoji(this)">🎨</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="😴" onclick="pickEmoji(this)">😴</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="🎵" onclick="pickEmoji(this)">🎵</span>
        <span class="color-swatch" style="font-size:1.5rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);width:42px;height:42px;" data-emoji="✏️" onclick="pickEmoji(this)">✏️</span>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Minutes</label>
        <input type="number" id="taskMinutes" value="5" min="0" max="180">
      </div>
      <div class="form-group">
        <label>Seconds</label>
        <input type="number" id="taskSeconds" value="0" min="0" max="59">
      </div>
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-picker-row" id="colorPicker">
        <div class="color-swatch selected" style="background:#e94560" data-color="#e94560" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#f0c040" data-color="#f0c040" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#4ecca3" data-color="#4ecca3" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#7b68ee" data-color="#7b68ee" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#ff6b6b" data-color="#ff6b6b" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#48dbfb" data-color="#48dbfb" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#ff9ff3" data-color="#ff9ff3" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#f368e0" data-color="#f368e0" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#0abde3" data-color="#0abde3" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#10ac84" data-color="#10ac84" onclick="pickColor(this)"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Sound Alert</label>
      <select id="taskSound">
        <option value="chime">🔔 Gentle Chime</option>
        <option value="ding">✨ Ding</option>
        <option value="bell">🔔 Bell</option>
        <option value="success">🎉 Success Fanfare</option>
      </select>
    </div>
    <div class="form-group" id="daySelectGroup" style="display:none;">
      <label>Day(s)</label>
      <div class="color-picker-row">
        <button class="btn-small btn-info day-check" data-day="0" onclick="toggleDay(this)">Sun</button>
        <button class="btn-small btn-info day-check" data-day="1" onclick="toggleDay(this)">Mon</button>
        <button class="btn-small btn-info day-check" data-day="2" onclick="toggleDay(this)">Tue</button>
        <button class="btn-small btn-info day-check" data-day="3" onclick="toggleDay(this)">Wed</button>
        <button class="btn-small btn-info day-check" data-day="4" onclick="toggleDay(this)">Thu</button>
        <button class="btn-small btn-info day-check" data-day="5" onclick="toggleDay(this)">Fri</button>
        <button class="btn-small btn-info day-check" data-day="6" onclick="toggleDay(this)">Sat</button>
        <button class="btn-small btn-warning" onclick="selectAllDays()">All</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-icon" onclick="closeModal()">Cancel</button>
      <button class="btn-success" id="modalSaveBtn" onclick="saveTask()">Add Task</button>
      <button class="btn-primary" id="modalDeleteBtn" style="display:none;background:#c0392b;" onclick="deleteTask()">🗑 Delete</button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let tasks = [];
let currentView = 'daily';
let currentLayout = 'grid';
let currentDay = new Date().getDay();
let editingId = null;
let selectedColor = '#e94560';
let selectedEmoji = '⏰';
let selectedDays = [0,1,2,3,4,5,6];
let timerIntervals = {};

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound(type) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  if (type === 'chime') {
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, now + i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.15 + 0.8);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + i*0.15);
      osc.stop(now + i*0.15 + 0.8);
    });
  } else if (type === 'ding') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 1.0);
  } else if (type === 'bell') {
    [660, 880, 1100].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 1.2);
    });
  } else if (type === 'success') {
    [523.25, 587.33, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, now + i*0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + i*0.1);
      osc.stop(now + i*0.1 + 0.3);
    });
  }
}

// ===== TASK MANAGEMENT =====
function genId() { return '_' + Math.random().toString(36).substr(2, 9); }

function getVisibleTasks() {
  if (currentView === 'weekly') {
    return tasks.filter(t => t.days && t.days.includes(currentDay));
  }
  return tasks;
}

function formatTime(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ===== RENDER =====
function render() {
  const grid = document.getElementById('taskGrid');
  const visible = getVisibleTasks();

  if (visible.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🌈</div>
        <p>No tasks yet! Add your first task to get started.</p>
        <button class="btn-primary" onclick="openAddModal()">＋ Add First Task</button>
      </div>`;
    return;
  }

  grid.innerHTML = visible.map((task, index) => {
    const elapsed = task.totalSeconds - task.remaining;
    const pct = task.totalSeconds > 0 ? (elapsed / task.totalSeconds) * 100 : 0;
    const isWarning = task.running && task.remaining <= 10 && task.remaining > 0;
    const isDone = task.remaining <= 0 && task.totalSeconds > 0;
    const classes = [
      'task-card',
      task.running ? 'active' : '',
      isDone ? 'completed' : '',
      isWarning ? 'warning' : ''
    ].filter(Boolean).join(' ');

    return `
      <div class="${classes}" style="--task-color: ${task.color}" id="card-${task.id}" draggable="true"
           ondragstart="dragStart(event,'${task.id}')" ondragover="dragOver(event)" ondrop="drop(event,'${task.id}')">
        <div class="task-fill" style="background:${task.color}; height:${pct}%"></div>
        <div class="task-content">
          <div class="task-header">
            <span class="task-emoji">${task.emoji}</span>
            <span class="task-title">${task.name}</span>
            <span class="task-order">#${index + 1}</span>
          </div>
          <div class="task-time-display" style="color:${isDone ? 'var(--success)' : task.running ? '#fff' : 'var(--text-dim)'}">
            ${isDone ? '✓ Done!' : formatTime(task.remaining)}
          </div>
          <div class="task-progress-bar">
            <div class="task-progress-fill" style="width:${pct}%; background:${task.color}"></div>
          </div>
          <div class="task-controls">
            ${!isDone ? `
              ${task.running
                ? `<button class="btn-small btn-warning" onclick="pauseTask('${task.id}')">⏸ Pause</button>`
                : `<button class="btn-small btn-success" onclick="startTask('${task.id}')">▶ Start</button>`
              }
              <button class="btn-small btn-info" onclick="resetTask('${task.id}')">↺</button>
            ` : `<button class="btn-small btn-success" onclick="resetTask('${task.id}')">↺ Restart</button>`}
            <button class="btn-small btn-icon" onclick="editTask('${task.id}')">✏️</button>
          </div>
          <div class="task-status">${
            isDone ? 'Completed! 🎉' :
            task.running ? 'In progress...' :
            task.remaining < task.totalSeconds ? 'Paused' : 'Ready'
          }</div>
        </div>
      </div>
    `;
  }).join('');
}

// ===== TIMER LOGIC =====
function startTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.remaining <= 0) return;
  task.running = true;

  clearInterval(timerIntervals[id]);
  timerIntervals[id] = setInterval(() => {
    task.remaining--;
    if (task.remaining <= 0) {
      task.remaining = 0;
      task.running = false;
      clearInterval(timerIntervals[id]);
      playSound(task.sound || 'chime');
      // Auto-advance to next task
      const visible = getVisibleTasks();
      const idx = visible.findIndex(t => t.id === id);
      if (idx >= 0 && idx < visible.length - 1) {
        const next = visible[idx + 1];
        setTimeout(() => startTask(next.id), 1500);
      }
    }
    render();
    save();
  }, 1000);

  render();
}

function pauseTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.running = false;
  clearInterval(timerIntervals[id]);
  render();
  save();
}

function resetTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.running = false;
  task.remaining = task.totalSeconds;
  clearInterval(timerIntervals[id]);
  render();
  save();
}

function startAll() {
  // Start the first non-completed task
  const visible = getVisibleTasks();
  const first = visible.find(t => t.remaining > 0);
  if (first) startTask(first.id);
}

function pauseAll() {
  tasks.forEach(t => {
    t.running = false;
    clearInterval(timerIntervals[t.id]);
  });
  render();
  save();
}

function resetAll() {
  tasks.forEach(t => {
    t.running = false;
    t.remaining = t.totalSeconds;
    clearInterval(timerIntervals[t.id]);
  });
  render();
  save();
}

// ===== DRAG & DROP REORDER =====
let dragId = null;
function dragStart(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function drop(e, targetId) {
  e.preventDefault();
  if (!dragId || dragId === targetId) return;
  const fromIdx = tasks.findIndex(t => t.id === dragId);
  const toIdx = tasks.findIndex(t => t.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = tasks.splice(fromIdx, 1);
  tasks.splice(toIdx, 0, moved);
  dragId = null;
  render();
  save();
}

// ===== MODAL =====
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Task';
  document.getElementById('modalSaveBtn').textContent = 'Add Task';
  document.getElementById('modalDeleteBtn').style.display = 'none';
  document.getElementById('taskName').value = '';
  document.getElementById('taskMinutes').value = 5;
  document.getElementById('taskSeconds').value = 0;
  document.getElementById('taskSound').value = 'chime';
  selectedColor = '#e94560';
  selectedEmoji = '⏰';
  selectedDays = [0,1,2,3,4,5,6];
  updateColorUI();
  updateEmojiUI();
  updateDayUI();
  document.getElementById('daySelectGroup').style.display = currentView === 'weekly' ? 'block' : 'none';
  document.getElementById('taskModal').classList.add('open');
  document.getElementById('taskName').focus();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('modalSaveBtn').textContent = 'Save';
  document.getElementById('modalDeleteBtn').style.display = 'inline-block';
  document.getElementById('taskName').value = task.name;
  document.getElementById('taskMinutes').value = Math.floor(task.totalSeconds / 60);
  document.getElementById('taskSeconds').value = task.totalSeconds % 60;
  document.getElementById('taskSound').value = task.sound || 'chime';
  selectedColor = task.color;
  selectedEmoji = task.emoji;
  selectedDays = task.days ? [...task.days] : [0,1,2,3,4,5,6];
  updateColorUI();
  updateEmojiUI();
  updateDayUI();
  document.getElementById('daySelectGroup').style.display = currentView === 'weekly' ? 'block' : 'none';
  document.getElementById('taskModal').classList.add('open');
}

function closeModal() {
  document.getElementById('taskModal').classList.remove('open');
  editingId = null;
}

function saveTask() {
  const name = document.getElementById('taskName').value.trim() || 'Task';
  const mins = parseInt(document.getElementById('taskMinutes').value) || 0;
  const secs = parseInt(document.getElementById('taskSeconds').value) || 0;
  const totalSeconds = mins * 60 + secs;
  const sound = document.getElementById('taskSound').value;

  if (totalSeconds <= 0) { alert('Please set a time!'); return; }

  if (editingId) {
    const task = tasks.find(t => t.id === editingId);
    if (task) {
      const wasRunning = task.running;
      if (wasRunning) pauseTask(task.id);
      task.name = name;
      task.totalSeconds = totalSeconds;
      task.remaining = totalSeconds;
      task.color = selectedColor;
      task.emoji = selectedEmoji;
      task.sound = sound;
      task.days = [...selectedDays];
    }
  } else {
    tasks.push({
      id: genId(),
      name,
      totalSeconds,
      remaining: totalSeconds,
      color: selectedColor,
      emoji: selectedEmoji,
      sound,
      running: false,
      days: [...selectedDays],
    });
  }

  closeModal();
  render();
  save();
}

function deleteTask() {
  if (!editingId) return;
  clearInterval(timerIntervals[editingId]);
  tasks = tasks.filter(t => t.id !== editingId);
  closeModal();
  render();
  save();
}

// ===== UI HELPERS =====
function pickColor(el) {
  selectedColor = el.dataset.color;
  updateColorUI();
}
function updateColorUI() {
  document.querySelectorAll('#colorPicker .color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === selectedColor);
  });
}
function pickEmoji(el) {
  selectedEmoji = el.dataset.emoji;
  updateEmojiUI();
}
function updateEmojiUI() {
  document.querySelectorAll('#emojiPicker .color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.emoji === selectedEmoji);
  });
}
function toggleDay(btn) {
  const day = parseInt(btn.dataset.day);
  const idx = selectedDays.indexOf(day);
  if (idx >= 0) selectedDays.splice(idx, 1);
  else selectedDays.push(day);
  updateDayUI();
}
function selectAllDays() {
  selectedDays = [0,1,2,3,4,5,6];
  updateDayUI();
}
function updateDayUI() {
  document.querySelectorAll('.day-check').forEach(btn => {
    const day = parseInt(btn.dataset.day);
    btn.style.opacity = selectedDays.includes(day) ? '1' : '0.35';
  });
}

// ===== VIEW SWITCHING =====
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.getElementById('weekBar').style.display = view === 'weekly' ? 'flex' : 'none';
  if (view === 'weekly') renderWeekBar();
  render();
  save();
}

function switchLayout(layout) {
  currentLayout = layout;
  const grid = document.getElementById('taskGrid');
  grid.classList.remove('layout-grid', 'layout-vertical', 'layout-horizontal');
  grid.classList.add('layout-' + layout);
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === layout));
  save();
}

function renderWeekBar() {
  const bar = document.getElementById('weekBar');
  const today = new Date().getDay();
  bar.innerHTML = DAYS_SHORT.map((d, i) => `
    <button class="day-btn ${i === currentDay ? 'active' : ''} ${i === today ? 'today' : ''}"
            onclick="switchDay(${i})">${d}</button>
  `).join('');
}

function switchDay(day) {
  currentDay = day;
  renderWeekBar();
  render();
}

// ===== PERSISTENCE (localStorage) =====
function save() {
  const data = { tasks, currentView, currentLayout, currentDay };
  localStorage.setItem('visualTaskTimer', JSON.stringify(data));
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 1500);
}

function load() {
  try {
    const raw = localStorage.getItem('visualTaskTimer');
    if (!raw) return;
    const data = JSON.parse(raw);
    tasks = data.tasks || [];
    // Ensure all tasks are stopped on load
    tasks.forEach(t => { t.running = false; });
    if (data.currentView) switchView(data.currentView);
    if (data.currentLayout) switchLayout(data.currentLayout);
    if (data.currentDay !== undefined) currentDay = data.currentDay;
  } catch(e) { console.warn('Load failed:', e); }
}

// ===== EXPORT/IMPORT =====
function exportSchedule() {
  const blob = new Blob([JSON.stringify({ tasks, version: 1 }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'visual-timer-schedule.json';
  a.click();
}

function importSchedule(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tasks) {
        tasks = data.tasks.map(t => ({ ...t, running: false, remaining: t.totalSeconds }));
        render();
        save();
      }
    } catch(err) { alert('Invalid file!'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && !document.querySelector('.modal-overlay.open') && e.target.tagName !== 'INPUT') openAddModal();
  if (e.key === ' ' && !document.querySelector('.modal-overlay.open') && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    const running = tasks.find(t => t.running);
    if (running) pauseAll();
    else startAll();
  }
});

// ===== THEME TOGGLE =====
function toggleTheme() {
  const root = document.documentElement;
  const isCurrentlyLight = root.classList.contains('light');
  if (isCurrentlyLight) {
    root.classList.remove('light');
    document.getElementById('themeToggle').textContent = '🌙';
    localStorage.setItem('visualTimerTheme', 'dark');
  } else {
    root.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
    localStorage.setItem('visualTimerTheme', 'light');
  }
}
function loadTheme() {
  const saved = localStorage.getItem('visualTimerTheme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

// ===== INIT =====
loadTheme();
load();
render();
if (currentView === 'weekly') renderWeekBar();
</script>
</body>
</html>
